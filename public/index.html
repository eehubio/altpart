const C={
  green:"#1a6c4e",greenLight:"#e8f5ef",greenMid:"#c2e5d3",greenAccent:"#2d9d6f",
  bg:"#fff",bgSoft:"#f7faf8",border:"#d4e8dc",borderLight:"#e8f0ec",

};

function scoreColor(s){return s>=90?C.green:s>=75?"#b8860b":s>=60?"#c2610c":"#c0392b"}
function scoreBg(s){return s>=90?"#e8f5ef":s>=75?"#fef9ed":s>=60?"#fef3e6":"#fdeaea"}

// Score ring
function ScoreRing({score,size=56,label}){
  const r=(size-8)/2,circ=2*Math.PI*r,offset=circ*(1-score/100),color=scoreColor(score);
  return(<svg width={size} height={size}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.borderLight} strokeWidth="4"/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
      strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
      transform={`rotate(-90 ${size/2} ${size/2})`}/>
    <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="central" fill={color}
      fontSize={size*0.26} fontWeight="700" fontFamily="'DM Mono',monospace">{score}</text>
  </svg>);
}

// Dimension score bar
function DimBar({label,score}){
  return(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
    <span style={{fontSize:12,color:C.textSec,minWidth:90}}>{label}</span>
    <div style={{flex:1,height:6,background:C.borderLight,borderRadius:3,overflow:"hidden"}}>
      <div style={{width:`${score}%`,height:"100%",background:scoreColor(score),transition:"width 0.6s"}}/>
    </div>
    <span style={{fontSize:12,fontWeight:600,color:scoreColor(score),fontFamily:"'DM Mono',monospace",minWidth:32,textAlign:"right"}}>{score}</span>
  </div>);
}

// Replacement level badge
function LevelBadge({level}){
  return(<span style={{padding:"3px 10px",borderRadius:5,background:level.color,color:"#fff",fontSize:12,fontWeight:700,letterSpacing:0.5}}>
    [{level.level}] {level.label}
  </span>);
}

// Source badge
function SourceTag({source,confidence}){
  if(!source)return null;
  const isHigh=confidence==="high";
  const color=isHigh?C.green:C.amber;
  const bg=isHigh?C.greenLight:C.amberBg;
  const icon=isHigh?"✓":"⚠";
  return(<span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:bg,color,border:`1px solid ${color}40`,marginLeft:6}}>
    📎 {source} {icon}
  </span>);
}

// Feedback panel
function FeedbackPanel({pn}){
  const[status,setStatus]=useState(null);
  const[expanded,setExpanded]=useState(false);
  const[submitted,setSubmitted]=useState(false);
  
  if(submitted){
    const st=FEEDBACK_STATUS[status];
    return(<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 18px",background:C.greenLight,borderTop:`1px solid ${C.greenMid}`,fontSize:12,color:C.green}}>
      <span>{st.icon} {st.label}</span>
      <span style={{color:C.textMute,fontSize:11}}>感谢反馈，将帮助优化推荐质量</span>
      <button style={{marginLeft:"auto",padding:"2px 8px",borderRadius:4,border:`1px solid ${C.border}`,background:"#fff",fontSize:11,cursor:"pointer"}} onClick={()=>setSubmitted(false)}>修改</button>
    </div>);
  }
  return(<div style={{borderTop:`1px dashed ${C.border}`,padding:"8px 18px 10px",background:"#fafcfb"}}>
    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
      <span style={{fontSize:12,color:C.textMute}}>验证结果:</span>
      {Object.entries(FEEDBACK_STATUS).filter(([k])=>k!=="testing").map(([k,v])=>(
        <button key={k} onClick={()=>{setStatus(k);if(!expanded){setTimeout(()=>setSubmitted(true),200)}}}
          style={{padding:"3px 8px",borderRadius:4,borderWidth:1,borderStyle:"solid",borderColor:status===k?v.color:C.border,background:status===k?v.color+"15":"#fff",fontSize:11,cursor:"pointer"}}>
          {v.icon} {v.label}
        </button>
      ))}
      <button onClick={()=>setExpanded(!expanded)} style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${C.indigoBorder}`,background:C.indigoBg,color:C.indigo,fontSize:11,cursor:"pointer",marginLeft:"auto"}}>
        {expanded?"收起":"详细"}
      </button>
    </div>
    {expanded&&(<div style={{marginTop:8,padding:"8px 0"}}>
      {[["PCB可直接替换"],["软件/固件兼容"],["电气参数已验证"]].map(([label],i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:12,color:C.textSec,minWidth:120}}>{label}</span>
          <div style={{display:"flex",gap:4}}>
            <button style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${C.border}`,background:"#fff",fontSize:11,cursor:"pointer"}}>✅ 是</button>
            <button style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${C.border}`,background:"#fff",fontSize:11,cursor:"pointer"}}>❌ 否</button>
            <button style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${C.border}`,background:"#fff",fontSize:11,cursor:"pointer"}}>❓ 未测</button>
          </div>
        </div>
      ))}
      <textarea style={{width:"100%",padding:"6px 8px",borderRadius:6,border:`1px solid ${C.border}`,fontSize:12,fontFamily:"inherit",marginTop:6}} rows={2} placeholder="补充说明（可选）..."/>
      <button onClick={()=>setSubmitted(true)} disabled={!status} style={{marginTop:8,padding:"6px 16px",borderRadius:6,border:"none",background:status?C.green:C.borderLight,color:"#fff",fontSize:13,fontWeight:600,cursor:status?"pointer":"not-allowed"}}>提交反馈</button>
    </div>)}
  </div>);
}

function adaptLive(d){
  const lc={status:"unknown",label:"未知",icon:"⚪"};
  const recommendations=(d.recommendations||[]).map((r,i)=>({
    rank:i+1,
    partNumber:r.partNumber,
    manufacturer:r.manufacturer||"",
    description:r.description||"",
    isPreferred:!!r.isPreferred,
    overallScore:r.overallScore,
    replacementLevel:r.replacementLevel||{level:"?",label:"",color:"#8aa698"},
    dimensionScores:r.dimensionScores||{hardware:0,functional:0,electrical:0,supply:0,risk:0},
    suitableScenarios:r.suitableScenarios||[],
    advantages:r.advantages||"—",
    risks:r.risks||"—",
    advice:r.advice||(r.replacementLevel?.level==="A"?"可直接替换，建议小批量验证":"建议样板验证后再批量使用"),
    paramScores:r.paramScores||[],
    lifecycle:lc,
    procurement:{},   // 实时模式采购信息走详情弹窗 /api/v2/part-detail
    inPLM:!!r.inPLM,
  }));
  return { original:d.original, recommendations, pipeline:d.pipeline, eliminated:d.eliminated||[] };
}

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      setLoading(true);setNote("");

      {page==="home"&&<HomePage onAnalyze={(pn,s)=>{setQueryPN(pn);setScenario(s);setPage("result")}} onBOM={()=>setPage("bom")}/>}
      {page==="result"&&<ResultPage partNumber={queryPN} scenario={scenario} onBack={()=>setPage("home")}/>}
      {page==="bom"&&<BOMPage onBack={()=>setPage("home")}/>}
    </main>
    
    <footer style={{textAlign:"center",padding:"16px 24px",borderTop:`1px solid ${C.borderLight}`,fontSize:12,color:C.textMute,background:"#fff"}}>
      AltPart AI v2.0 演示版 · 实际效果以集成后为准
    </footer>
  </React.Fragment>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
