// ═══ 通用组件 ═══
function ScoreRing({score,size=56}){
  const r=(size-8)/2,circ=2*Math.PI*r,offset=circ*(1-score/100),color=scoreColor(score);
  return(<svg width={size} height={size}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.borderLight} strokeWidth="4"/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/>
    <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="central" fill={color} fontSize={size*0.28} fontWeight="700" fontFamily="'DM Mono',monospace">{score}</text>
  </svg>);
}
function LevelBadge({level}){
  return <span style={{padding:"3px 10px",borderRadius:5,background:level.color,color:"#fff",fontSize:12,fontWeight:700}}>[{level.level}] {level.label}</span>;
}
function SourceTag({source,sourceLabel}){
  if(!source)return null;
  const isAI=source==="ai_search"||source==="ai_lookup";
  const color=isAI?C.amber:C.green,bg=isAI?C.amberBg:C.greenLight;
  return <span style={{fontSize:10,padding:"1px 5px",borderRadius:3,background:bg,color,border:`1px solid ${color}40`}}>📎 {sourceLabel||source} {isAI?"⚠":"✓"}</span>;
}

function ParamRow({p,index,con,onSetCon,onDragStart,onDragOver,onDrop,dragging}){
  const[open,setOpen]=useState(false);
  const[type,setType]=useState(con?.constraintType||"none");
  const[min,setMin]=useState(con?.min??"");
  const[max,setMax]=useState(con?.max??"");
  const save=()=>{
    if(type==="none")onSetCon(p.id,null);
    else onSetCon(p.id,{constraintType:type,min:min===""?null:min,max:max===""?null:max});
    setOpen(false);
  };
  const hasCon=con&&con.constraintType;
  return(<div draggable onDragStart={e=>onDragStart(e,index)} onDragOver={e=>onDragOver(e,index)} onDrop={e=>onDrop(e,index)}
    style={{borderRadius:8,border:`1.5px solid ${hasCon?(con.constraintType==="hard"?"#c0392b60":C.amber+"80"):C.borderLight}`,background:"#fff",marginBottom:6,cursor:"grab",opacity:dragging===index?0.4:1}}>
    <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",cursor:"pointer"}}>
      <span style={{minWidth:24,height:24,borderRadius:5,background:C.greenLight,color:C.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace",border:`1px solid ${C.greenMid}`}}>{index+1}</span>
      <span style={{color:C.textMute,fontSize:13,cursor:"grab"}}>⣿</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:600}}>{p.name}{hasCon&&<span style={{marginLeft:6,fontSize:10,padding:"1px 5px",borderRadius:3,background:con.constraintType==="hard"?"#fdeaea":C.amberBg,color:con.constraintType==="hard"?"#c0392b":C.amber}}>{con.constraintType==="hard"?"硬约束":"软偏好"}</span>}</div>
        <div style={{fontSize:11,color:C.textMute}}>{p.nameEn}</div>
      </div>
      <span style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:C.textSec,whiteSpace:"nowrap"}}>{p.value}{p.unit?` ${p.unit}`:""}</span>
      <span style={{fontSize:10,color:C.textMute}}>▾</span>
    </div>
    {open&&(<div style={{padding:"8px 12px 10px",borderTop:`1px dashed ${C.borderLight}`,background:C.bgSoft}}>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {[["none","无约束"],["hard","硬约束(不满足即淘汰)"],["soft","软偏好(不满足扣分)"]].map(([v,l])=>(
          <button key={v} onClick={()=>setType(v)} style={{padding:"4px 10px",borderRadius:5,borderWidth:1,borderStyle:"solid",borderColor:type===v?C.green:C.border,background:type===v?C.greenLight:"#fff",fontSize:11,cursor:"pointer"}}>{l}</button>))}
      </div>
      {type!=="none"&&(<div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
        <span style={{fontSize:12,color:C.textSec}}>范围:</span>
        <input value={min} onChange={e=>setMin(e.target.value)} placeholder="最小值" style={{width:90,padding:"5px 8px",borderRadius:5,border:`1px solid ${C.border}`,fontSize:12,fontFamily:"'DM Mono',monospace"}}/>
        <span style={{color:C.textMute}}>~</span>
        <input value={max} onChange={e=>setMax(e.target.value)} placeholder="最大值" style={{width:90,padding:"5px 8px",borderRadius:5,border:`1px solid ${C.border}`,fontSize:12,fontFamily:"'DM Mono',monospace"}}/>
        <span style={{fontSize:11,color:C.textMute}}>{p.unit}</span>
      </div>)}
      <button onClick={save} style={{padding:"5px 16px",borderRadius:5,border:"none",background:C.green,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>确定</button>
    </div>)}
  </div>);
}

// ═══ 结果卡片 ═══
function ResultCard({rec,index,onShowDetail}){
  const[expanded,setExpanded]=useState(index===0);
  return(<div style={{borderRadius:10,border:`1.5px solid ${C.border}`,background:"#fff",overflow:"hidden",marginBottom:14,animation:"fadeUp 0.4s ease both",animationDelay:`${index*0.06}s`}}>
    <div style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onClick={()=>setExpanded(!expanded)}>
      <div style={{width:30,height:30,borderRadius:7,background:C.greenLight,color:C.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace",border:`1px solid ${C.greenMid}`}}>#{index+1}</div>
      <ScoreRing score={rec.confidence??rec.overallScore}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
          <LevelBadge level={rec.replacementLevel}/>
          <span onClick={e=>{e.stopPropagation();onShowDetail(rec.partNumber,rec)}}
            style={{fontSize:18,fontWeight:700,fontFamily:"'DM Mono',monospace",color:C.green,cursor:"pointer",textDecoration:"underline dotted",textUnderlineOffset:3}}
            title="点击查看详情和供应商采购信息">{rec.partNumber} 🔍</span>
          {rec.isPreferred&&<span style={{padding:"2px 7px",borderRadius:4,background:C.amberBg,color:C.amber,fontSize:11,fontWeight:600,border:"1px solid #f0dca0"}}>⭐ 优选</span>}
          {rec.inPLM&&<span style={{padding:"2px 7px",borderRadius:4,background:C.indigoBg,color:C.indigo,fontSize:11,fontWeight:600,border:`1px solid ${C.indigoBorder}`}}>📦 ezPLM</span>}
          <span style={{padding:"2px 7px",borderRadius:4,background:C.bgSoft,color:C.textMute,fontSize:10,border:`1px solid ${C.borderLight}`}}>{rec.dataSource}</span>
        </div>
        <div style={{fontSize:13,color:C.textMute}}>{rec.manufacturer}</div>
        {rec.description&&<div style={{fontSize:12,color:C.textMute,marginTop:2}}>{rec.description}</div>}
      </div>
      <div style={{fontSize:16,color:C.textMute,transform:expanded?"rotate(180deg)":"rotate(0)",transition:"transform 0.2s"}}>▾</div>
    </div>
    {(rec.technical!=null)&&(<div style={{padding:"0 18px 10px"}}>
      <div style={{display:"flex",gap:8}}>
        {[["技术兼容",rec.technical],["证据覆盖",rec.evidenceCoverage!=null?rec.evidenceCoverage+"%":"—"],["来源可信",rec.sourceConfidence!=null?rec.sourceConfidence+"%":"—"],["结论可信",rec.confidence]].map(([l,v],i)=>(
          <div key={i} style={{flex:1,padding:"7px 8px",borderRadius:7,background:i===3?C.greenLight:C.bgSoft,border:`1px solid ${i===3?C.greenMid:C.borderLight}`,textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,fontFamily:"'DM Mono',monospace",color:i===3?C.green:C.text}}>{v}</div>
            <div style={{fontSize:10,color:C.textMute,marginTop:1}}>{l}</div>
          </div>))}
      </div>
      {rec.replacementLevel?.level==="P2"&&<div style={{marginTop:6,fontSize:11,color:"#854f0b",background:C.amberBg,border:"1px solid #f0dca0",borderRadius:6,padding:"5px 8px"}}>⚠ 参数高度匹配，但引脚映射尚未验证 — 需人工核对引脚后方可判定"可直接替换"</div>}
      {rec.replacementLevel?.level==="P0"&&<div style={{marginTop:6,fontSize:11,color:"#7a5b00",background:"#f5f0e0",border:"1px solid #e0d4a0",borderRadius:6,padding:"5px 8px"}}>ℹ 证据覆盖率过低，数据不足以判断兼容性</div>}
    </div>)}
    {expanded&&(rec.paramScores||[]).length>0&&(<div style={{padding:"0 14px 12px"}}>
      <div style={{padding:"6px 10px",fontSize:12,fontWeight:600,color:C.text}}>🔬 参数对比详情</div>
      {rec.paramScores.map(ps=>(
        <div key={ps.paramId} style={{display:"grid",gridTemplateColumns:"110px 1fr 40px 120px auto",gap:8,alignItems:"center",padding:"6px 10px",borderRadius:6,background:ps.known===false?"#f5f5f5":scoreBg(ps.score),fontSize:12,marginBottom:3}}>
          <div style={{color:C.textSec,fontSize:11}}>{ps.paramName}</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:12}}>{ps.value}{ps.unit&&!String(ps.value).includes(ps.unit)?` ${ps.unit}`:""}</div>
          <div style={{fontWeight:700,color:ps.known===false?C.textMute:scoreColor(ps.score),fontFamily:"'DM Mono',monospace",textAlign:"center"}}>{ps.known===false?"—":ps.score}</div>
          <div style={{color:C.textMute,fontSize:11}}>{ps.comment}</div>
          <div style={{textAlign:"right"}}><SourceTag source={ps.source} sourceLabel={ps.sourceLabel}/></div>
        </div>))}
    </div>)}
  </div>);
}

// ═══ 对比表视图 ═══
function CompareTable({original,recs}){
  const params=original.parameters||[];
  return(<div style={{overflowX:"auto",borderRadius:10,border:`1.5px solid ${C.border}`,background:"#fff"}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:640}}>
      <thead><tr style={{background:C.greenLight}}>
        <th style={{padding:"9px 12px",textAlign:"left",fontSize:12,color:C.green,borderBottom:`1px solid ${C.greenMid}`,position:"sticky",left:0,background:C.greenLight}}>参数</th>
        <th style={{padding:"9px 12px",textAlign:"left",fontSize:12,color:C.textSec,borderBottom:`1px solid ${C.greenMid}`}}>{original.partNumber}<div style={{fontSize:10,fontWeight:400}}>原型号</div></th>
        {recs.map(r=><th key={r.partNumber} style={{padding:"9px 12px",textAlign:"left",fontSize:12,color:C.green,borderBottom:`1px solid ${C.greenMid}`}}>{r.partNumber}<div style={{fontSize:10,fontWeight:400,color:scoreColor(r.confidence)}}>可信{r.confidence}</div></th>)}
      </tr></thead>
      <tbody>{params.map((p,i)=>(<tr key={p.id} style={i%2?{background:C.bgSoft}:{}}>
        <td style={{padding:"7px 12px",fontWeight:600,fontSize:11,color:C.textSec,position:"sticky",left:0,background:i%2?C.bgSoft:"#fff"}}>{p.name}</td>
        <td style={{padding:"7px 12px",fontFamily:"'DM Mono',monospace",fontSize:11}}>{p.value}{p.unit?` ${p.unit}`:""}</td>
        {recs.map(r=>{const ps=(r.paramScores||[]).find(x=>x.paramId===p.id);
          return<td key={r.partNumber} style={{padding:"7px 12px",fontFamily:"'DM Mono',monospace",fontSize:11,background:ps?(ps.known===false?"#f5f5f5":scoreBg(ps.score)):undefined}}>
            {ps?`${ps.value}${ps.unit&&!String(ps.value).includes(ps.unit)?" "+ps.unit:""}`:"—"}
            {ps&&ps.known!==false&&<span style={{marginLeft:6,fontWeight:700,color:scoreColor(ps.score)}}>{ps.score}</span>}
          </td>;})}
      </tr>))}</tbody>
    </table>
  </div>);
}

// ═══ 工作台（双栏）═══
function Workbench({original,demoNote,onBack}){
  const[params,setParams]=useState((original.parameters||[]).slice(0,10));
  const[constraints,setConstraints]=useState({});
  const[mfrs,setMfrs]=useState([]);
  const[mfrInput,setMfrInput]=useState("");
  const[mode,setMode]=useState("funcCompat");
  const[phase,setPhase]=useState("idle"); // idle|loading|done
  const[result,setResult]=useState(null);
  const[note,setNote]=useState(demoNote||"");
  const[view,setView]=useState("cards");
  const[detailPN,setDetailPN]=useState(null);
  const[detailRec,setDetailRec]=useState(null);
  const[dragging,setDragging]=useState(null);
  const dragFrom=useRef(null);

  const onDragStart=(e,i)=>{dragFrom.current=i;setDragging(i);};
  const onDragOver=(e,i)=>{e.preventDefault();};
  const onDrop=(e,i)=>{
    e.preventDefault();
    const from=dragFrom.current;
    if(from==null||from===i)return void setDragging(null);
    const next=[...params];const[m]=next.splice(from,1);next.splice(i,0,m);
    setParams(next);setDragging(null);dragFrom.current=null;
  };
  const setCon=(pid,c)=>setConstraints(prev=>{const n={...prev};if(c)n[pid]=c;else delete n[pid];return n;});
  const addMfr=()=>{const v=mfrInput.trim();if(v&&!mfrs.includes(v)){setMfrs([...mfrs,v]);}setMfrInput("");};
  const mfrSuggest=mfrInput?POPULAR_MFRS.filter(m=>m.toLowerCase().includes(mfrInput.toLowerCase())&&!mfrs.includes(m)).slice(0,5):[];

  const runRecommend=async()=>{
    setPhase("loading");setNote("");
    try{
      const r=await fetch("/api/v2/recommend",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({partNumber:original.partNumber,mode,preferredManufacturers:mfrs,constraints,
          priorityOrder:params.map(p=>p.id),original:original._dataPath==="demo"?undefined:original})});
      const d=await r.json().catch(()=>null);
      if(d&&d.success&&d.recommendations?.length){
        setResult(d);setPhase("done");
      }else{
        setResult({recommendations:MOCK_RECS,eliminated:[],pipeline:null,_demo:true});
        setNote(d&&d.success===false?`真实查询失败：${d.error||"未知错误"} — 暂显示演示数据`:"后端不可用，显示演示数据");
        setPhase("done");
      }
    }catch(e){
      setResult({recommendations:MOCK_RECS,eliminated:[],pipeline:null,_demo:true});
      setNote("无法连接后端（网络或超时），显示演示数据");setPhase("done");
    }
  };

  const exportMD=()=>{
    if(!result)return;
    let md=`# ${original.partNumber} 替代料推荐\n\n| # | 型号 | 厂商 | 等级 | 结论可信度 |\n|---|------|------|------|------|\n`;
    result.recommendations.forEach((r,i)=>{md+=`| ${i+1} | ${r.partNumber} | ${r.manufacturer} | ${r.replacementLevel.level} ${r.replacementLevel.label} | ${r.confidence??r.overallScore} |\n`;});
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+md],{type:"text/markdown"}));a.download=`${original.partNumber}_替代推荐.md`;a.click();
  };
  const exportCSV=()=>{
    if(!result)return;
    let csv="\uFEFF型号,厂商,等级,技术兼容,证据覆盖,来源可信,结论可信\n";
    result.recommendations.forEach(r=>{csv+=`${r.partNumber},${r.manufacturer},${r.replacementLevel.level},${r.technical??""},${r.evidenceCoverage??""},${r.sourceConfidence??""},${r.confidence??r.overallScore}\n`;});
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=`${original.partNumber}_替代推荐.csv`;a.click();
  };

  return(<div className="workbench" style={{maxWidth:1400,margin:"16px auto",padding:"0 20px",display:"grid",gridTemplateColumns:"400px 1fr",gap:18,alignItems:"start"}}>
    {/* ══ 左栏 ══ */}
    <div>
      <div style={{borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",padding:"16px 18px",marginBottom:14}}>
        <span style={{padding:"3px 10px",borderRadius:5,background:C.greenLight,color:C.green,fontSize:12,fontWeight:600,border:`1px solid ${C.greenMid}`}}>{original.category||"元器件"}</span>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,flexWrap:"wrap"}}>
          <span style={{fontSize:21,fontWeight:700,fontFamily:"'DM Mono',monospace",color:C.text}}>{original.partNumber}</span>
          {original._dataPath==="local_db"&&<span style={{padding:"2px 7px",borderRadius:4,background:C.greenLight,color:C.green,fontSize:10,fontWeight:600,border:`1px solid ${C.greenMid}`}}>📦 本地库命中</span>}
          {original._dataPath==="ai_search"&&<span style={{padding:"2px 7px",borderRadius:4,background:C.amberBg,color:C.amber,fontSize:10,fontWeight:600,border:"1px solid #f0dca0"}}>🌐 AI搜索</span>}
        </div>
        <div style={{fontSize:13,color:C.textMute,marginTop:4}}>{original.manufacturer}</div>
        {original.description&&<div style={{fontSize:13,color:C.textSec,marginTop:4}}>{original.description}</div>}
      </div>

      <div style={{borderRadius:12,border:`1.5px solid ${C.indigoBorder}`,background:"#fff",padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>🏭 优选厂商</div>
        <div style={{fontSize:12,color:C.textMute,marginBottom:10}}>添加优选厂商后，同分候选将优先推荐</div>
        <div style={{display:"flex",gap:6,position:"relative"}}>
          <input value={mfrInput} onChange={e=>setMfrInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addMfr()}}
            placeholder="输入厂商名称搜索…" style={{flex:1,padding:"9px 12px",borderRadius:7,border:`1px solid ${C.border}`,fontSize:13}}/>
          <button onClick={addMfr} style={{padding:"9px 16px",borderRadius:7,border:"none",background:C.indigo,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",opacity:mfrInput.trim()?1:0.5}}>添加</button>
          {mfrSuggest.length>0&&(<div style={{position:"absolute",top:"100%",left:0,right:70,marginTop:4,background:"#fff",border:`1px solid ${C.border}`,borderRadius:7,boxShadow:"0 8px 24px rgba(0,0,0,0.1)",zIndex:20}}>
            {mfrSuggest.map(m=><div key={m} onClick={()=>{setMfrs([...mfrs,m]);setMfrInput("")}} style={{padding:"8px 12px",fontSize:12,cursor:"pointer",borderBottom:`1px solid ${C.borderLight}`}}>{m}</div>)}
          </div>)}
        </div>
        {mfrs.length>0&&(<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10}}>
          {mfrs.map(m=>(<span key={m} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:14,background:C.indigoBg,color:C.indigo,fontSize:12,border:`1px solid ${C.indigoBorder}`}}>
            ⭐ {m}<span onClick={()=>setMfrs(mfrs.filter(x=>x!==m))} style={{cursor:"pointer",fontWeight:700}}>×</span></span>))}
        </div>)}
      </div>

      <div style={{borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:14,fontWeight:700}}>📊 参数优先级与范围</span>
          <span style={{fontSize:11,color:C.textMute}}>拖拽排序 · 点击设约束</span>
        </div>
        {params.map((p,i)=>(<ParamRow key={p.id} p={p} index={i} con={constraints[p.id]} onSetCon={setCon}
          onDragStart={onDragStart} onDragOver={onDragOver} onDrop={onDrop} dragging={dragging}/>))}
      </div>

      <div style={{borderRadius:12,border:`1.5px solid ${C.border}`,background:"#fff",padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>🔀 替代模式</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {SUB_MODES.map(m=>(<button key={m.id} onClick={()=>setMode(m.id)}
            style={{padding:"9px 12px",borderRadius:8,borderWidth:1.5,borderStyle:"solid",borderColor:mode===m.id?C.green:C.border,background:mode===m.id?C.greenLight:"#fff",cursor:"pointer",textAlign:"left"}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text}}>{m.label}</div>
            <div style={{fontSize:10,color:C.textMute}}>{m.desc}</div>
          </button>))}
        </div>
      </div>

      <button onClick={runRecommend} disabled={phase==="loading"}
        style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:phase==="loading"?C.greenAccent:C.green,color:"#fff",fontSize:15,fontWeight:700,cursor:phase==="loading"?"wait":"pointer",letterSpacing:1}}>
        {phase==="loading"?"⏳ 推荐中…":phase==="done"?"🔄 重新推荐":"🚀 AI 智能推荐"}
      </button>
      <button onClick={onBack} style={{width:"100%",marginTop:8,padding:"9px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",color:C.textSec,fontSize:13,cursor:"pointer"}}>← 重新搜索</button>
    </div>

    {/* ══ 右栏 ══ */}
    <div style={{minHeight:400}}>
      {note&&<div style={{padding:"8px 14px",borderRadius:7,background:C.amberBg,border:"1px solid #f0dca0",color:"#854f0b",fontSize:12,marginBottom:12}}>ℹ️ {note}</div>}
      {phase==="idle"&&(<div style={{textAlign:"center",paddingTop:150,color:C.textMute}}>
        <div style={{fontSize:16,fontWeight:600,color:C.textSec,marginBottom:6}}>调整参数后，点击「AI 智能推荐」</div>
        <div style={{fontSize:13}}>AI推荐候选 → 本地库校验 → 算法评分 → 输出 Top 5</div>
      </div>)}
      {phase==="loading"&&(<div style={{textAlign:"center",paddingTop:150,color:C.textMute}}>
        <div style={{width:38,height:38,border:`3px solid ${C.borderLight}`,borderTopColor:C.green,borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 14px"}}/>
        正在推荐（AI候选 → 本地库校验 → 评分淘汰），约需 10–30 秒…
      </div>)}
      {phase==="done"&&result&&(<div style={{animation:"fadeUp 0.4s ease both"}}>
        {result.pipeline&&(<div style={{padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.indigoBorder}`,background:C.indigoBg,marginBottom:12,fontSize:11,color:C.indigo}}>
          🔀 AI推荐{result.pipeline.candidatesReceived}个 → 本地库命中{result.pipeline.localDbHits} / AI校验{result.pipeline.aiLookups} → 淘汰{result.pipeline.candidatesEliminated} → Top {result.pipeline.finalCount} · ⏱ {(result.pipeline.executionTimeMs/1000).toFixed(1)}s
        </div>)}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <h3 style={{fontSize:16,fontWeight:700}}>推荐结果 <span style={{fontSize:13,color:C.textMute,fontWeight:400}}>· {result.recommendations.length} 个替代方案 · 点击型号查看采购详情</span></h3>
          <div style={{display:"flex",gap:6}}>
            <div style={{display:"flex",borderRadius:7,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <button onClick={()=>setView("cards")} style={{padding:"5px 14px",border:"none",background:view==="cards"?C.green:"#fff",color:view==="cards"?"#fff":C.textSec,fontSize:12,cursor:"pointer"}}>卡片</button>
              <button onClick={()=>setView("table")} style={{padding:"5px 14px",border:"none",background:view==="table"?C.green:"#fff",color:view==="table"?"#fff":C.textSec,fontSize:12,cursor:"pointer"}}>对比表</button>
            </div>
            <button onClick={exportMD} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.border}`,background:"#fff",fontSize:12,cursor:"pointer"}}>📄 MD</button>
            <button onClick={exportCSV} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.border}`,background:"#fff",fontSize:12,cursor:"pointer"}}>📊 CSV</button>
          </div>
        </div>
        {view==="cards"
          ?result.recommendations.map((rec,i)=><ResultCard key={rec.partNumber} rec={rec} index={i} onShowDetail={(pn,r)=>{setDetailPN(pn);setDetailRec(r)}}/>)
          :<CompareTable original={original} recs={result.recommendations}/>}
        {(result.eliminated||[]).length>0&&(<details style={{marginTop:12,borderRadius:10,border:`1px solid ${C.borderLight}`,background:"#fff"}}>
          <summary style={{padding:"11px 16px",cursor:"pointer",fontSize:13,color:C.textSec,fontWeight:500}}>🚫 被淘汰的候选（{result.eliminated.length}个）</summary>
          <div style={{padding:"0 16px 12px"}}>
            {result.eliminated.map((e,i)=>(<div key={i} style={{display:"flex",gap:12,padding:"6px 0",borderBottom:`1px solid ${C.borderLight}`,fontSize:12}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600,color:C.textSec,minWidth:130}}>{e.partNumber}</span>
              <span style={{color:"#c0392b",flex:1}}>{e.reason}</span>
            </div>))}
          </div>
        </details>)}
      </div>)}
      {detailPN&&<PartDetailModal pn={detailPN} rec={detailRec} onClose={()=>{setDetailPN(null);setDetailRec(null)}}/>}
    </div>
  </div>);
}

// ═══ 后端状态 ═══
function BackendStatus(){
  const[st,setSt]=useState(null);
  useEffect(()=>{fetch("/api/health").then(r=>r.ok?r.json():null).then(setSt).catch(()=>setSt(false));},[]);
  if(st===null)return <span>检测后端中…</span>;
  if(!st)return <span>前端演示模式（后端未部署）</span>;
  const g=st.config?.geminiConfigured;
  return <span>后端已连接 · {st.config?.mode}{g?" · Gemini已配置 ✓":" · ⚠ 未配置GEMINI_API_KEY"}</span>;
}

// ═══ 主应用 ═══
function App(){
  const[page,setPage]=useState("home");
  const[original,setOriginal]=useState(null);
  const[busy,setBusy]=useState(false);
  const[demoNote,setDemoNote]=useState("");

  const analyze=async(pn)=>{
    setBusy(true);setDemoNote("");
    try{
      const r=await fetch("/api/v2/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({partNumber:pn})});
      const d=await r.json().catch(()=>null);
      if(d&&d.success&&d.original?.parameters?.length){
        setOriginal(d.original);setPage("workbench");
      }else{
        setOriginal({...MOCK_ORIGINAL,partNumber:pn.toUpperCase()===MOCK_ORIGINAL.partNumber?MOCK_ORIGINAL.partNumber:pn});
        setDemoNote(d&&d.success===false?`参数查询失败：${d.error} — 显示演示参数`:"后端不可用 — 显示演示参数");
        setPage("workbench");
      }
    }catch(e){
      setOriginal(MOCK_ORIGINAL);setDemoNote("无法连接后端 — 显示演示参数");setPage("workbench");
    }finally{setBusy(false);}
  };

  return(<React.Fragment>
    <div style={{background:"linear-gradient(90deg,#fef9ed,#fff)",padding:"7px 24px",fontSize:12,color:"#854f0b",borderBottom:"1px solid #f0dca0",display:"flex",justifyContent:"space-between"}}>
      <div><b>AltPart AI v2.3</b> · <BackendStatus/></div>
    </div>
    <header style={{background:"#fff",borderBottom:`1px solid ${C.border}`,padding:"12px 24px"}}>
      <div style={{maxWidth:1400,margin:"0 auto",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:38,height:38,borderRadius:9,background:C.green,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" stroke="#fff" strokeWidth="1.8" fill="none"/><path d="M12 7v10M7 9.5l5 3 5-3" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/></svg>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700,color:C.text}}>AltPart AI</div>
          <div style={{fontSize:11,color:C.textMute}}>元器件替代料智能推荐 · 混合架构</div>
        </div>
        {page==="workbench"&&<button onClick={()=>setPage("home")} style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",color:C.textSec,fontSize:13,cursor:"pointer"}}>← 重新搜索</button>}
      </div>
    </header>
    <main style={{minHeight:"calc(100vh - 130px)"}}>
      {page==="home"&&<HomePage onSubmit={analyze} busy={busy}/>}
      {page==="workbench"&&original&&<Workbench original={original} demoNote={demoNote} onBack={()=>setPage("home")}/>}
    </main>
    <footer style={{textAlign:"center",padding:"14px",borderTop:`1px solid ${C.borderLight}`,fontSize:12,color:C.textMute,background:"#fff"}}>
      AltPart AI v2.3 · 本地数据库优先 · AI候选 · 确定性评分
    </footer>
  </React.Fragment>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
